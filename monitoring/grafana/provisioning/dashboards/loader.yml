# Loader de dashboards (Cycle 14.2, D-030).
# Grafana scanne `path` au démarrage et charge tous les .json trouvés.
apiVersion: 1

providers:
  - name: rakuten
    orgId: 1
    folder: Rakuten
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
