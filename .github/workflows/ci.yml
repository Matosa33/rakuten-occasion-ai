# CI Rakuten (Cycle 15.2, D-033 - étend la version minimale C0/C1).
# Lint + tests sur chaque push et pull_request → main.
# Cible : feedback PR < 5 min. Les tests qui exigent des artefacts ML lourds
# (FAISS HNSW 13,8 Go, M8 joblib, train.parquet) skipent automatiquement via
# les `pytest.mark.skipif(not file.exists(), ...)` déjà en place.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # permet le déclenchement manuel

# Permissions minimales (principe du moindre privilège).
permissions:
  contents: read

# Annule les runs précédents sur la même branche / PR pour économiser les minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.3.0"

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format --check
        run: ruff format --check src/ tests/

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + extras
        # `[api]` pour FastAPI + JWT, `[ml]` pour torch CPU + transformers,
        # `[data]` pour polars + pandas, `[dev]` pour pytest + cov + ruff,
        # `[monitoring]` pour Evidently + prometheus-client (push_metrics),
        # `[mlops]` pour mlflow + dvc (tests test_mlflow_utils / test_promote_gate).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,ml,api,monitoring,mlops]" \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run pytest + coverage
        # `--cov-report=xml` pour upload artefact, `--cov-fail-under=0` désactive
        # le seuil (la couverture exacte dépend des artefacts ML présents/absents).
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pytest -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  security:
    name: Security (pip-audit CVE scan)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,ml,api,monitoring,mlops]" \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip install pip-audit

      - name: pip-audit (CVE scan)
        # D-034 : échoue sur toute CVE fixable. Ignorées avec justification :
        #   CVE-2025-69872 (diskcache, dep transitive DVC) - AUCUNE version de
        #   fix publiée à ce jour (vérifié audit 2026-06-05) ; risque accepté.
        #   CVE-2025-3000 (torch) - aucune version corrigée publiée à ce jour
        #   (vérifié 2026-07-01) ; risque accepté : torch sert à l'encodage local,
        #   jamais exposé au réseau.
        #   PYSEC-2026-597 (nltk) - aucune version corrigée publiée à ce jour
        #   (vérifié 2026-07-02) ; risque accepté : nltk sert au nettoyage de texte
        #   hors-ligne (data prep), jamais exposé à une entrée réseau.
        run: |
          pip-audit --skip-editable --ignore-vuln CVE-2025-69872 --ignore-vuln CVE-2025-3000 --ignore-vuln PYSEC-2026-597

  docker-build:
    name: Docker build check (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: infra/docker/Dockerfile.api
          - image: frontend
            dockerfile: infra/docker/Dockerfile.frontend
          - image: airflow
            dockerfile: infra/docker/Dockerfile.airflow
          - image: mlflow
            dockerfile: infra/docker/Dockerfile.mlflow
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build (no push)
        # D-034 : vérifie que le Dockerfile compile sur PR - avant ce job, un
        # Dockerfile cassé n'était détecté qu'au push main (workflow ghcr).
        # Cache partagé avec ghcr.yml (mêmes scopes) → build incrémental.
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
