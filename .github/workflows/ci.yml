# CI Rakuten (Cycle 15.2, D-033 — étend la version minimale C0/C1).
# Lint + tests sur chaque push et pull_request → main.
# Cible : feedback PR < 5 min. Les tests qui exigent des artefacts ML lourds
# (FAISS HNSW 13,8 Go, M8 joblib, train.parquet) skipent automatiquement via
# les `pytest.mark.skipif(not file.exists(), ...)` déjà en place.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # permet le déclenchement manuel

# Permissions minimales (principe du moindre privilège).
permissions:
  contents: read

# Annule les runs précédents sur la même branche / PR pour économiser les minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.3.0"

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format --check
        run: ruff format --check src/ tests/

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + extras
        # `[api]` pour FastAPI + JWT, `[ml]` pour torch CPU + transformers,
        # `[data]` pour polars + pandas, `[dev]` pour pytest + cov + ruff,
        # `[monitoring]` pour Evidently + prometheus-client (push_metrics).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,ml,api,monitoring]" \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run pytest + coverage
        # `--cov-report=xml` pour upload artefact, `--cov-fail-under=0` désactive
        # le seuil (la couverture exacte dépend des artefacts ML présents/absents).
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pytest -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  brain-structure:
    name: BRAIN 9 fichiers présents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify BRAIN structure
        # Garde-fou : le brain canonique doit toujours avoir ses 9 fichiers.
        # Catché un drift en C13.99 (state.md > 100 lignes), ici on garantit
        # juste l'existence (la longueur est testée dans test_brain_structure).
        run: |
          test -f BRAIN/bios.md
          test -f BRAIN/state.md
          test -f BRAIN/decisions.md
          test -f BRAIN/golden_rules.md
          test -f BRAIN/to-do.md
          test -f BRAIN/learnings.md
          test -f BRAIN/erreur_a_ne_plus_faire.md
          test -f BRAIN/glossary.md
          test -f BRAIN/context.md
          echo "BRAIN 9 fichiers présents ✓"
