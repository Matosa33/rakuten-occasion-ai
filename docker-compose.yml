# Stack Rakuten — Compose unifié (Cycle 13.2, D-025).
#
# Démarrage (depuis la racine du repo) :
#   docker compose up -d --build       # construit et démarre tout
#   docker compose ps                  # état des services
#   docker compose logs -f api         # suit les logs d'un service
#   docker compose down                # arrête (préserve les volumes)
#
# UI — DEUX modes d'accès (depuis C13.3, D-026) :
#
# (a) Direct sur chaque service (debug, dev) — ports customisables via .env :
#   - Frontend         : http://localhost:8082   (var FRONTEND_PORT)
#   - API              : http://localhost:8010   (var API_PORT)
#   - Airflow UI       : http://localhost:8088   (var AIRFLOW_PORT)  admin/admin
#   - MLflow UI        : http://localhost:5000   (var MLFLOW_PORT, C13.4 D-027)
#   - MinIO console    : http://localhost:9011   (var MINIO_CONSOLE_PORT, login minioadmin)
#
# (b) Unifié derrière Traefik (proche de la prod) :
#   - http://rakuten.localhost:8090/    → frontend
#   - http://api.localhost:8090/        → API (rate-limited, secure headers)
#   - http://airflow.localhost:8090/    → Airflow UI
#   - http://mlflow.localhost:8090/     → MLflow server (C13.4)
#   - http://localhost:8091/            → dashboard Traefik (dev only, à fermer en prod)
#
# Les *.localhost se résolvent automatiquement (RFC 6761) sans modifier /etc/hosts.
#
# Conflits de ports (XAMPP, autres uvicorn...) ? Créer un `.env` :
#   API_PORT=8011 / FRONTEND_PORT=8082 / AIRFLOW_PORT=8089 / TRAEFIK_PORT=8091
#
# Overlay prod : `docker compose -f docker-compose.yml -f docker-compose.prod.yml up`.

# ─────────────────────────────────────────────────────────────────────────────
# YAML anchors — config Airflow partagée par init/scheduler/webserver.
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-}"
  PYTHONPATH: /opt/rakuten
  # MLflow tracking via HTTP server (D-027) → artifacts S3 dans MinIO (rembourse
  # D-023, plus de `artifact_logging=deferred` sur les futurs runs in-container).
  MLFLOW_TRACKING_URI: http://mlflow-server:5000
  MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

x-airflow-volumes: &airflow-volumes
  # repo entier monté (code + data + mlflow.db + mlartifacts live).
  - .:/opt/rakuten
  - ./infra/airflow/dags:/opt/airflow/dags
  - ./infra/airflow/logs:/opt/airflow/logs
  - ./infra/airflow/plugins:/opt/airflow/plugins

x-airflow-depends: &airflow-depends
  postgres:
    condition: service_healthy

services:
  # ───────────────────────────────────────────────────────────────────────────
  # MinIO object store (Cycle 13.4, D-027). S3-compatible, héberge 2 buckets :
  # `mlflow-artifacts` (artefacts MLflow) et `dvc` (remote DVC). Console UI :9001,
  # endpoint S3 :9000. Rembourse D-023 (artefacts portables hôte↔conteneur).
  # ───────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # Personnalisable via .env si 9010/9011 sont pris. Note : à l'intérieur du
      # réseau Docker, MinIO écoute toujours sur 9000/9001 (les services internes
      # `mlflow-server` / `airflow-*` utilisent `http://minio:9000`).
      - "127.0.0.1:${MINIO_API_PORT:-9010}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot : crée les buckets `mlflow-artifacts` + `dvc` au démarrage.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}
        mc mb -p local/mlflow-artifacts || true
        mc mb -p local/dvc || true
        echo "buckets ready: mlflow-artifacts, dvc"
    restart: "no"

  # Postgres dédié MLflow (séparation des concerns vs Postgres Airflow, D-027).
  postgres-mlflow:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 5s
      retries: 5

  # MLflow tracking server : backend Postgres + artifacts S3 (MinIO). Rembourse
  # D-023 — les runs in-container peuvent enfin pousser leurs artefacts.
  mlflow-server:
    image: rakuten/mlflow:dev
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mlflow
    depends_on:
      postgres-mlflow:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlflow:mlflow@postgres-mlflow/mlflow
      - --default-artifact-root=s3://mlflow-artifacts/
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      # Optionnel : expose mlflow.localhost via Traefik (cohérent avec D-026).
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`mlflow.localhost`)"
      - "traefik.http.routers.mlflow.entrypoints=web"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"
      - "traefik.http.routers.mlflow.middlewares=sec-headers@docker"

  # ───────────────────────────────────────────────────────────────────────────
  # Reverse proxy Traefik (Cycle 13.3, D-026). Routing host-based via labels
  # Docker (api.localhost / rakuten.localhost / airflow.localhost). HTTP only
  # en dev (TLS en overlay prod, hors-scope 13.3).
  # ───────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.2
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"      # dashboard sans auth en dev ; à fermer en prod
      - "--ping=true"               # endpoint /ping pour healthcheck
      - "--log.level=INFO"
      # Métriques Prometheus (Cycle 14.2, D-030) — scraping par le service `prometheus`
      # sur le port admin 8080 (interne). Labels enrichis = panels Grafana plus utiles.
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "127.0.0.1:${TRAEFIK_PORT:-8090}:80"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-8091}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      # Middlewares globaux (références : `nom@docker`).
      - "traefik.enable=true"
      - "traefik.http.middlewares.sec-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # API FastAPI (Cycle 9 / image C13.1). Sert /identify, /price, /describe.
  # Volumes data en READ-ONLY (l'API ne ré-écrit pas les artefacts ML).
  # ───────────────────────────────────────────────────────────────────────────
  api:
    image: rakuten/api:dev
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      # Active /metrics Prometheus (C14.2, D-030). Opt-in pour permettre aux tests
      # pytest qui ré-instancient l'app de tourner sans `Duplicated timeseries`
      # (la lib leak la Gauge inprogress vers le REGISTRY global).
      ENABLE_METRICS: "true"
    ports:
      # Personnalisable via `API_PORT=xxxx` dans `.env` (8000 souvent pris par
      # uvicorn dev / XAMPP). Par défaut 8010 = libre sur la plupart des postes.
      - "127.0.0.1:${API_PORT:-8010}:8000"
    volumes:
      - ./data:/opt/rakuten/data:ro
      - ./mlflow.db:/opt/rakuten/mlflow.db:ro
      - ./mlartifacts:/opt/rakuten/mlartifacts:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # 300 s pour tolérer le premier load de l'index FAISS 13,8 Go via bind-mount
      # RO Docker Desktop Windows (5-15 min). Sous Linux natif c'est instantané.
      start_period: 300s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.routers.api.middlewares=sec-headers@docker,api-ratelimit@docker"

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend React/Vite servi par nginx (image C13.1).
  # Proxy /api/ → service "api" (DNS Docker, cf. nginx.conf).
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    image: rakuten/frontend:dev
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      # Personnalisable via `FRONTEND_PORT=xxxx` (8080/8081 souvent pris par Apache/XAMPP).
      - "127.0.0.1:${FRONTEND_PORT:-8082}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`rakuten.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.middlewares=sec-headers@docker"

  # ───────────────────────────────────────────────────────────────────────────
  # Métadonnées Airflow (Cycle 12.1). Volume nommé → durabilité du registry DAG.
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Airflow init (one-shot) : db migrate + utilisateur admin.
  # ───────────────────────────────────────────────────────────────────────────
  airflow-init:
    image: rakuten/airflow:dev
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.airflow
    environment: *airflow-env
    volumes: *airflow-volumes
    working_dir: /opt/rakuten
    depends_on: *airflow-depends
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Rakuten --lastname Admin \
          --role Admin --email admin@example.com || true
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────────
  # Airflow scheduler : exécute les DAGs (`rakuten_retrain`, `rakuten_drift_check`).
  # ───────────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    image: rakuten/airflow:dev
    environment: *airflow-env
    volumes: *airflow-volumes
    working_dir: /opt/rakuten
    depends_on:
      <<: *airflow-depends
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # ───────────────────────────────────────────────────────────────────────────
  # Airflow webserver : UI sur http://localhost:8088 (admin/admin).
  # ───────────────────────────────────────────────────────────────────────────
  airflow-webserver:
    image: rakuten/airflow:dev
    environment: *airflow-env
    volumes: *airflow-volumes
    working_dir: /opt/rakuten
    ports:
      # Personnalisable via `AIRFLOW_PORT=xxxx`. 8088 par défaut (8080 souvent pris).
      - "127.0.0.1:${AIRFLOW_PORT:-8088}:8080"
    depends_on:
      <<: *airflow-depends
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airflow.rule=Host(`airflow.localhost`)"
      - "traefik.http.routers.airflow.entrypoints=web"
      - "traefik.http.services.airflow.loadbalancer.server.port=8080"
      - "traefik.http.routers.airflow.middlewares=sec-headers@docker"

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus (Cycle 14.2, D-030). Scrape les /metrics : api, traefik, self.
  # Config statique en bind-mount → lisible et versionnable.
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.middlewares=sec-headers@docker"

  # ───────────────────────────────────────────────────────────────────────────
  # Pushgateway (Cycle 14.3, D-031). Hub de métriques batch (drift Evidently +
  # promote_gate). Les jobs Python pushent sur `pushgateway:9091/metrics/job/...`,
  # Prometheus scrape via le job `pushgateway` (cf. prometheus.yml).
  # ───────────────────────────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:v1.10.0
    command:
      - "--web.listen-address=:9091"
      - "--persistence.file=/data/pushgateway.bin"
      - "--persistence.interval=30s"
    volumes:
      - pushgateway-data:/data
    ports:
      - "127.0.0.1:${PUSHGATEWAY_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana (Cycle 14.2, D-030). Datasource Prometheus + dashboard 4 golden
  # signals provisionnés via fichiers (reproductible, pas de clic-clic UI).
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auth anonyme désactivée par défaut → dashboard visible après login admin/admin.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=sec-headers@docker"

volumes:
  airflow-pgdata:
  # Nouveaux volumes pour la stack C13.4 (MinIO + MLflow tracking server).
  minio-data:
  mlflow-pgdata:
  # Nouveaux volumes pour la stack C14.2 (observabilité Prometheus + Grafana).
  prometheus-data:
  grafana-data:
  # Nouveau volume pour la stack C14.3 (Pushgateway métriques batch, D-031).
  pushgateway-data:
