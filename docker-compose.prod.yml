# Overlay PROD pour la stack Rakuten (Cycle 13.2, D-025).
#
# Lancer :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Différences vs dev (base) :
#   - restart policy stricte (`unless-stopped`) → survit aux crash + reboot
#   - ports api / airflow NON exposés à l'hôte (Traefik 13.3 en frontal)
#   - frontend reste exposé (point d'entrée HTTP du user final)

services:
  traefik:
    restart: unless-stopped
    # En prod, le dashboard Traefik est fermé (pas de --api.insecure) ; en accès
    # réel = à mettre derrière basic auth + TLS via une overlay TLS plus tard.
    # NB audit 2026-06-05 : ce `command:` REMPLACE celui de la base → il doit
    # re-déclarer les flags metrics C14.2 (sinon le job Prometheus `traefik`
    # devient DOWN en prod, régression silencieuse).
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--ping=true"
      - "--log.level=WARN"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports: !reset
      - "80:80"

  api:
    restart: unless-stopped
    # Plus de port hôte direct : accès via Traefik uniquement.
    ports: !reset []

  frontend:
    restart: unless-stopped
    # Idem : Traefik prend la main, plus de port direct exposé.
    ports: !reset []

  postgres:
    restart: unless-stopped

  airflow-scheduler:
    restart: unless-stopped

  airflow-webserver:
    restart: unless-stopped
    # UI Airflow pas exposée publiquement en prod ; Traefik la protègera.
    ports: !reset []

  # ── Services C13.4 + C14.2/14.3 (audit 2026-06-05 : manquaient à l'overlay,
  # donc pas de restart policy ni de fermeture de ports en prod). Les ports
  # restent fermés (accès interne réseau Docker + Traefik pour mlflow/grafana/
  # prometheus via leurs labels).
  minio:
    restart: unless-stopped
    ports: !reset []

  postgres-mlflow:
    restart: unless-stopped

  mlflow-server:
    restart: unless-stopped
    ports: !reset []

  prometheus:
    restart: unless-stopped
    ports: !reset []

  grafana:
    restart: unless-stopped
    ports: !reset []

  pushgateway:
    restart: unless-stopped
    ports: !reset []
