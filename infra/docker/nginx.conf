# Config nginx du frontend Rakuten (Cycle 13.1).
# - sert la SPA depuis /usr/share/nginx/html
# - fallback try_files vers index.html pour les routes client-side (React Router)
# - proxy /api/ → service "api" (nom de service Compose, sera défini en 13.2)
# - préserve les headers utilisateurs (X-Real-IP, Host) pour les logs API

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA : toute route inconnue de nginx → index.html (le routeur React prend).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend : /api/foo → http://api:8000/foo
    # (matche le proxy Vite de dev : vite.config.ts rewrite /api → :8000).
    #
    # `resolver 127.0.0.11` = DNS embarqué Docker → résolution À LA REQUÊTE
    # (sinon nginx tente de résoudre "api" au parse et plante au démarrage si
    # le service n'est pas encore là ; cf. découverte smoke test C13.1).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/identify/stream) : pas de bufferisation + timeout long.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
