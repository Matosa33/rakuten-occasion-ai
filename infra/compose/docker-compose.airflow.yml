# Airflow (LocalExecutor + Postgres) pour la boucle de ré-entraînement Rakuten.
# Cf. BRAIN/decisions.md D-022. Lancer depuis la racine repo via `make airflow-up`.
#
# L'orchestrateur orchestre, il ne calcule pas le GPU : les tâches lancent les
# scripts CPU `python -m src.classifiers.*` sur le repo monté (/opt/rakuten),
# et lisent/écrivent les VRAIS artefacts (data/, mlflow.db, mlartifacts/).

x-airflow-common: &airflow-common
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile.airflow
  image: rakuten/airflow:dev
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-}"
    # cwd des tâches = racine repo montée → `python -m src.x` + REPO_ROOT corrects
    PYTHONPATH: /opt/rakuten
    # MLflow écrit dans le mlflow.db monté (même backend que la dev, D-021)
    MLFLOW_TRACKING_URI: sqlite:////opt/rakuten/mlflow.db
  volumes:
    - ../../:/opt/rakuten                      # repo live : code + data + mlflow.db + mlartifacts
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  working_dir: /opt/rakuten
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # Migration DB + création de l'utilisateur admin (one-shot).
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Rakuten --lastname Admin \
          --role Admin --email admin@example.com || true
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  airflow-pgdata:
