# Gabarit Secret K8s (Cycle 13.5, D-028).
# COPIER en `infra/k8s/secrets.yaml` (gitignored) et remplacer les valeurs en prod.
# Les défauts sont OK pour dev/démo seulement.
#
# Création hors gitignore : cp infra/k8s/02-secrets.example.yaml infra/k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: rakuten-secrets
  namespace: rakuten
type: Opaque
stringData:
  # MinIO (R2 : NE PAS commiter de vraies clés ; les défauts dev sont publics).
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin"
  # PostgreSQL MLflow.
  POSTGRES_MLFLOW_PASSWORD: "mlflow"
  # JWT auth API (D-032). En prod : python -c "import secrets; print(secrets.token_urlsafe(32))"
  JWT_SECRET: "dev-secret-change-me-in-prod"
