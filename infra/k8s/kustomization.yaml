# Kustomize base : agrège tous les manifests Rakuten (Cycle 13.5, D-028).
# Apply : `kubectl apply -k infra/k8s/`
#
# `secrets.yaml` est gitignored (créé depuis 02-secrets.example.yaml). Si absent
# au moment de l'apply, copier d'abord :
#   cp infra/k8s/02-secrets.example.yaml infra/k8s/secrets.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rakuten
resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - secrets.yaml
  - 10-minio.yaml
  - 20-postgres-mlflow.yaml
  - 30-mlflow-server.yaml
  - 40-api.yaml
  - 50-frontend.yaml
  - 60-ingress.yaml
