# MinIO S3-compatible (Cycle 13.5, D-028 ; équivalent K8s du service Compose C13.4).
# StatefulSet pour identité réseau stable + PVC.
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: rakuten
  labels: { app: minio }
spec:
  type: ClusterIP
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
  selector: { app: minio }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: rakuten
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - { name: api, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
---
# Job one-shot : crée les buckets `mlflow-artifacts` + `dvc` (équivalent
# minio-init du Compose). Idempotent grâce au `mc mb -p`.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: rakuten
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-04-16T18-13-26Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_PASSWORD } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "wait MinIO..."; sleep 3
              done
              mc mb -p local/mlflow-artifacts
              mc mb -p local/dvc
              echo "buckets ready"
