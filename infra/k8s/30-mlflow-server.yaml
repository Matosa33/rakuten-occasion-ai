# MLflow tracking server (Cycle 13.5). image `rakuten/mlflow:dev` built en C13.4.
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
  namespace: rakuten
  labels: { app: mlflow-server }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 5000, targetPort: 5000 }
  selector: { app: mlflow-server }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: rakuten
spec:
  replicas: 1
  selector: { matchLabels: { app: mlflow-server } }
  template:
    metadata: { labels: { app: mlflow-server } }
    spec:
      containers:
        - name: mlflow
          image: rakuten/mlflow:dev
          imagePullPolicy: IfNotPresent   # image locale chargée via `kind load`
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=postgresql://mlflow:$(POSTGRES_MLFLOW_PASSWORD)@$(POSTGRES_MLFLOW_HOST)/mlflow
            - --default-artifact-root=s3://mlflow-artifacts/
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom: { configMapKeyRef: { name: rakuten-config, key: MLFLOW_S3_ENDPOINT_URL } }
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_USER } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: rakuten-secrets, key: MINIO_ROOT_PASSWORD } }
            - name: POSTGRES_MLFLOW_HOST
              valueFrom: { configMapKeyRef: { name: rakuten-config, key: POSTGRES_MLFLOW_HOST } }
            - name: POSTGRES_MLFLOW_PASSWORD
              valueFrom:
                { secretKeyRef: { name: rakuten-secrets, key: POSTGRES_MLFLOW_PASSWORD } }
          ports:
            - { name: http, containerPort: 5000 }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 30
            periodSeconds: 30
